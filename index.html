<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bossmj34 Panel</title>

<style>
*{box-sizing:border-box}

body{
    margin:0;
    font-family: monospace;
    color:white;
    text-align:center;
    overflow-x:hidden;

    /* ROCKET GRADIENT BACKGROUND */
    background: linear-gradient(270deg,#000428,#004e92,#000428,#1a2980);
    background-size:600% 600%;
    animation:bgMove 15s ease infinite;
}

@keyframes bgMove{
    0%{background-position:0% 50%}
    50%{background-position:100% 50%}
    100%{background-position:0% 50%}
}

/* FLOAT ANIMATION */
@keyframes float{
    0%{transform:translateY(0px)}
    50%{transform:translateY(-6px)}
    100%{transform:translateY(0px)}
}

/* FUND */
.fund{
    font-size:13px;
    margin-top:10px;
    opacity:0.8;
}

/* LOGO */
.logo{
    font-size:46px;
    font-weight:bold;
    letter-spacing:4px;
    margin:10px 0 20px;
    text-shadow:0 0 25px #00f0ff;
}

/* GLASS BOX */
.box{
    width:90%;
    max-width:340px;
    margin:10px auto;
    padding:15px;
    border-radius:15px;

    background: rgba(255,255,255,0.08);
    backdrop-filter: blur(12px);
}

/* INPUT */
input{
    width:100%;
    padding:12px;
    margin:8px 0;
    border:none;
    border-radius:8px;
}

/* BUTTON */
.btn{
    margin:15px auto;
    padding:15px;
    width:90%;
    max-width:320px;
    border-radius:15px;
    cursor:pointer;

    background: rgba(255,255,255,0.12);
    backdrop-filter: blur(10px);

    transition:0.3s;
    animation:float 3s infinite;
}

.btn:hover{
    transform:scale(1.05);
    box-shadow:0 0 20px #00f0ff;
}

/* SERVICES */
.service-box{
    margin:10px auto;
    padding:15px;
    width:90%;
    max-width:320px;
    border-radius:15px;
    cursor:pointer;

    background: rgba(255,255,255,0.1);

    transition:0.3s;
}

.service-box:hover{
    transform:scale(1.05);
    box-shadow:0 0 20px cyan;
}

/* RECEIPT */
#receiptOverlay{
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    display:none;
    justify-content:center;
    align-items:center;
    background: rgba(0,0,0,0.7);
}

#receiptBox{
    background: rgba(255,255,255,0.1);
    padding:20px;
    border-radius:15px;
    width:90%;
    max-width:320px;

    backdrop-filter: blur(15px);

    animation:pop 0.4s ease;
}

@keyframes pop{
    from{transform:scale(0.6); opacity:0;}
    to{transform:scale(1); opacity:1;}
}

.close{
    margin-top:15px;
    padding:10px;
    background:#00f0ff;
    color:black;
    border-radius:10px;
    cursor:pointer;
}
</style>
</head>

<body>

<script>
let userFund = 305;
</script>

<div class="fund">Fund: ₱<span id="fund"></span></div>

<div class="logo">BOSSMJ34</div>

<!-- LINK + QUANTITY (ALWAYS VISIBLE) -->
<div class="box">
    <input type="text" id="link" placeholder="Facebook Link">
    <input type="number" id="qty" placeholder="Quantity (e.g. 5000)" oninput="calcTotal()">
</div>

<!-- SERVICES -->
<div class="service-box" onclick="selectService('Page Followers',22)">
    👍 Page Followers (₱22 / 1000)
</div>

<div class="service-box" onclick="selectService('Profile Followers',22)">
    👤 Profile Followers (₱22 / 1000)
</div>

<div class="service-box" onclick="selectService('Views',7.50)">
    👁️ Views (₱4.80 / 1000)
</div>

<div class="service-box" onclick="selectService('Reaction',12.78)">
    ❤️ Reaction (₱12.78 / 1000)
</div>

<h3>Total: ₱<span id="total">0</span></h3>

<div class="btn" onclick="submitOrder()">🚀 Submit Order</div>

<!-- RECEIPT -->
<div id="receiptOverlay">
    <div id="receiptBox"></div>
</div>

<script>
document.getElementById("fund").innerText = userFund;

let selectedPrice = 0;
let selectedService = "";

function selectService(name, price){
    selectedService = name;
    selectedPrice = price;
    calcTotal();
}

function calcTotal(){
    let qty = document.getElementById("qty").value;
    let total = (qty / 1000) * selectedPrice;
    document.getElementById("total").innerText = total.toFixed(2);
}

function submitOrder(){
    let link = document.getElementById("link").value;
    let qty = document.getElementById("qty").value;
    let total = (qty / 1000) * selectedPrice;

    if(!selectedService){
        alert("Select a service!");
        return;
    }

    if(total > userFund){
        alert("Insufficient Fund!");
        return;
    }

    userFund -= total;
    document.getElementById("fund").innerText = userFund.toFixed(2);

    let date = new Date().toLocaleString();

    document.getElementById("receiptOverlay").style.display = "flex";
    document.getElementById("receiptBox").innerHTML = `
        <h2>🚀 RECEIPT</h2>
        Date: ${date}<br>
        Service: ${selectedService}<br>
        Link: ${link}<br>
        Quantity: ${qty}<br>
        Total: ₱${total.toFixed(2)}
        <div class="close" onclick="closeReceipt()">Close</div>
    `;
}

function closeReceipt(){
    document.getElementById("receiptOverlay").style.display = "none";
}
</script>

</body>
</html>
